            position: relative;
            overflow: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in-up {
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;

        }

        @keyframes blob {

            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 10s infinite alternate ease-in-out; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }

        @keyframes float {

        }
        .particle {

            animation: float 6s infinite ease-in-out;
            color: #c58b85;

 moment our story truly began. From 15th December 2023 to today, we've laughed until our stomachs hurt, argued over the dumbest things, annoyed each other more times than I can count, made up after fights, celebrated little wins together, and created memories I'll probably carry for the rest of my life. Have we fought? More times than we'd like to admit 😭. But the one thing I've realised is that no fight has ever been stronger than what we have. Somehow, no matter how upset we get, we always find our way back to each other. I think that's my favourite thing about us. We laugh like best friends. We care for each other like a couple. We fight like siblings. And somehow... all three of those things make us us. I genuinely wouldn't want our story to be perfect. I'd rather have this one... because it's real. It's messy sometimes, it's emotional sometimes, it's full of random inside jokes, late-night conversations, unnecessary arguments, \"good morning\" texts, \"have you eaten?\" reminders, and a million little moments that probably don't mean much to anyone else... but mean everything to me. So if someone ever asks me what my favourite love story is... It'll always be ours. And hopefully... this is only the beginning. I love you so much, my darling. Here's to every memory we've already made... and to all the ones that are still waiting for us. ❤️"

                { title: "Perfect", artist: "Ed Sheeran", note: null, audioSrc: "perfect-ed-sheeran.mp3" },
                { title: "Perfect", artist: "One Direction", note: null, audioSrc: "perfect-one-direction.mp3", startTime: 110 },
                { title: "Toota Jo Kabhi Taara", artist: "Atif Aslam", note: null, audioSrc: "toota-jo-kabhi-taara.mp3", startTime: 0, endTime: 170 },
                { title: "Kaise Hua", artist: "Vishal Mishra", note: null, audioSrc: "kaise-hua.mp3", startTime: 110 },
                { title: "Pal Pal Dil Ke Paas", artist: "Arijit Singh", note: null, audioSrc: "pal-pal-dil-ke-paas.mp3", startTime: 0, endTime: 160 },
                { title: "Zaalima", artist: "Arijit Singh", note: null, audioSrc: "zaalima.mp3", startTime: 0, endTime: 115 }
            ]
        };

        const showCustomMessage = (msg) => {
            const box = document.getElementById('custom-msg-box');
            document.getElementById('custom-msg-text').innerText = msg;
            box.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            setTimeout(() => { box.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none'); }, 4000);
        };

        const animateValue = (obj, start, end, duration) => {
            if (isNaN(end)) { obj.innerHTML = end; return; }
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start) + "+";
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        };

        const renderContent = () => {
            document.getElementById('hero-title').innerText = SITE_CONTENT.global.title;
            document.getElementById('welcome-text').innerText = SITE_CONTENT.welcomeText;
            document.getElementById('darling-heading').innerText = SITE_CONTENT.darlingSection.heading;
            document.getElementById('darling-text').innerText = `"${SITE_CONTENT.darlingSection.text}"`;
            document.getElementById('about-heading').innerText = SITE_CONTENT.aboutUs.heading;
            document.getElementById('about-text').innerText = SITE_CONTENT.aboutUs.text;

            const statsHtml = `
                <div class="flex flex-col items-center justify-center p-5 bg-white/40 rounded-3xl border border-white/50 backdrop-blur-sm shadow-sm hover:-translate-y-1 transition duration-300">
                    <h3 class="stat-num text-4xl font-serif text-accent mb-2 drop-shadow-sm" data-val="934">0</h3>
                    <p class="text-[10px] sm:text-xs font-sans uppercase tracking-[0.2em] text-stone-600 text-center font-semibold">Days Loved</p>
                </div>
                <div class="flex flex-col items-center justify-center p-5 bg-white/40 rounded-3xl border border-white/50 backdrop-blur-sm shadow-sm hover:-translate-y-1 transition duration-300">
                    <h3 class="text-3xl sm:text-4xl font-serif text-accent mb-2 drop-shadow-sm">${SITE_CONTENT.stats.insideJokes}</h3>
                    <p class="text-[10px] sm:text-xs font-sans uppercase tracking-[0.2em] text-stone-600 text-center font-semibold">Inside Jokes</p>
                </div>
                <div class="flex flex-col items-center justify-center p-5 bg-white/40 rounded-3xl border border-white/50 backdrop-blur-sm shadow-sm hover:-translate-y-1 transition duration-300">
                    <h3 class="text-xl sm:text-3xl font-serif text-accent mb-2 leading-tight text-center drop-shadow-sm">${SITE_CONTENT.stats.argumentsSurvived}</h3>
                    <p class="text-[10px] sm:text-xs font-sans uppercase tracking-[0.2em] text-stone-600 text-center font-semibold mt-1">Arguments</p>
                </div>
                <div class="flex flex-col items-center justify-center p-5 bg-white/40 rounded-3xl border border-white/50 backdrop-blur-sm shadow-sm hover:-translate-y-1 transition duration-300">
                    <h3 class="text-xl sm:text-3xl font-serif text-accent mb-2 leading-tight text-center drop-shadow-sm">${SITE_CONTENT.stats.darlingsSaid}</h3>
                    <p class="text-[10px] sm:text-xs font-sans uppercase tracking-[0.2em] text-stone-600 text-center font-semibold mt-1">Darlings Said</p>
                </div>
            `;
            document.getElementById('stats-container').innerHTML = statsHtml;

            // Notice how `song.note` applies the highlight class magically ✨
            document.getElementById('music-container').innerHTML = SITE_CONTENT.musicVault.map((song, idx) => `
                <div class="flex flex-col md:flex-row items-center gap-5 p-5 rounded-2xl ${song.note ? 'song-highlighted shadow-sm' : 'bg-white/40 border-white/50 hover:bg-white/60'} border transition duration-300 group">
                    <button onclick="toggleAudio(${idx})" class="h-14 w-14 ${song.note ? 'bg-rose hover:bg-accent' : 'bg-beige hover:bg-rose'} transition-colors rounded-full flex items-center justify-center flex-shrink-0 text-${song.note ? 'white' : 'stone-700'} shadow-md focus:outline-none transform group-hover:scale-105">
                        <i data-lucide="play" id="play-icon-${idx}" class="ml-1 w-6 h-6"></i>
                    </button>
                    <div class="flex-1 text-center md:text-left">
                        <div class="flex items-center justify-center md:justify-start gap-2 mb-1">
                            <h4 class="font-serif text-xl text-stone-800 font-bold">${song.title}</h4>
                            ${song.note ? '<i data-lucide="sparkles" class="w-4 h-4 text-accent fill-current"></i>' : ''}
                        </div>
                        ${song.artist ? `<p class="text-xs font-sans text-stone-500 uppercase tracking-widest mb-1 font-semibold">${song.artist}</p>` : ''}
                        ${song.note ? `<p class="text-stone-700 italic text-sm mt-3 font-serif border-l-2 border-rose pl-4 text-left leading-relaxed">"${song.note}"</p>` : ''}
                    </div>
                    <audio id="audio-${idx}" src="${song.audioSrc}" preload="none" onended="audioEnded(${idx})" ontimeupdate="checkAudioTime(${idx})"></audio>
                </div>
            `).join('');

            document.getElementById('faq-container').innerHTML = SITE_CONTENT.faq.map(item => `
                <div class="border-b border-rose/20 pb-6 last:border-b-0 last:pb-0">
                    <h4 class="font-serif text-xl text-accent mb-3 font-semibold tracking-wide">Q: ${item.q}</h4>
                    <p class="text-stone-700 pl-5 border-l-2 border-rose leading-loose font-serif text-lg">${item.a}</p>
                </div>
            `).join('');

            // Generate locked boxes dynamically
            let boxesHtml = '';
            for(let i=1; i<=4; i++) {
                boxesHtml += `
                <div class="glass-panel p-8 rounded-3xl text-center border-dashed border-2 border-beige/60">
                    <i data-lucide="lock" class="mx-auto text-stone-400 mb-3 w-7 h-7 opacity-70"></i>
                    <p class="text-stone-600 font-sans font-bold tracking-widest uppercase text-sm">Surprise #${i}</p>
                    <p class="text-xs text-stone-400 mt-2 font-serif italic">Unlocks eventually... u gotta wait darling</p>
                </div>`;
            }
            boxesHtml += `
                <div class="glass-panel p-8 rounded-3xl text-center border-dashed border-2 border-beige/60 md:col-span-1 col-span-2">
                    <i data-lucide="lock" class="mx-auto text-stone-400 mb-3 w-7 h-7 opacity-70"></i>
                    <p class="text-stone-600 font-sans font-bold tracking-widest uppercase text-sm">The Final Chapter</p>
                    <p class="text-xs text-stone-400 mt-2 font-serif italic">Unlocks eventually... u gotta wait darling</p>
                </div>`;
            document.getElementById('locked-boxes-container').innerHTML = boxesHtml;
            
            lucide.createIcons();
            
            setTimeout(() => {
                document.querySelectorAll('.stat-num').forEach(el => {
                    const target = parseInt(el.getAttribute('data-val'));
                    animateValue(el, 0, target, 2500);
                });
            }, 300);
        };

        let currentAudioIdx = null;
        
        window.toggleAudio = (idx) => {
            const audioEl = document.getElementById(`audio-${idx}`);
            const iconEl = document.getElementById(`play-icon-${idx}`);
            
            if (!audioEl.getAttribute('src') || audioEl.getAttribute('src') === "") {
                showCustomMessage("Please add the .mp3 file for this song in the folder first, darling! 🎶");
                return;
            }

            const songData = SITE_CONTENT.musicVault[idx];

            if (currentAudioIdx !== null && currentAudioIdx !== idx) {
                const prevAudio = document.getElementById(`audio-${currentAudioIdx}`);
                const prevIcon = document.getElementById(`play-icon-${currentAudioIdx}`);
                if (prevAudio) {
                    prevAudio.pause();
                    prevIcon.setAttribute('data-lucide', 'play');
                }
            }

            if (audioEl.paused) {
                if (songData.startTime && audioEl.currentTime < songData.startTime) {
                    audioEl.currentTime = songData.startTime;
                }
                audioEl.play().catch(e => showCustomMessage("Oops! Couldn't play the file. Make sure the file name is correct."));
                iconEl.setAttribute('data-lucide', 'pause');
                currentAudioIdx = idx;
            } else {
                audioEl.pause();
                iconEl.setAttribute('data-lucide', 'play');
                currentAudioIdx = null;
            }
            lucide.createIcons(); 
        };

        window.checkAudioTime = (idx) => {
            const audioEl = document.getElementById(`audio-${idx}`);
            const songData = SITE_CONTENT.musicVault[idx];
            if (songData.endTime && audioEl.currentTime >= songData.endTime) {
                audioEl.pause();
                audioEl.currentTime = songData.startTime || 0; 
                window.audioEnded(idx);
            }
        };

        window.audioEnded = (idx) => {
            const iconEl = document.getElementById(`play-icon-${idx}`);
            if (iconEl) {
                iconEl.setAttribute('data-lucide', 'play');
                lucide.createIcons();
            }
            currentAudioIdx = null;
        };

        window.onload = () => {
            renderContent();
        };
    </script>
</body>
</html>
